<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1f2e"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#e8c84a" stroke-width="6" opacity="0.4"/>
  
  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="256" rx="192" ry="74" fill="none" stroke="#e8c84a" stroke-width="3.5" opacity="0.25"/>
  <ellipse cx="256" cy="256" rx="192" ry="138" fill="none" stroke="#e8c84a" stroke-width="3.5" opacity="0.18"/>
  
  <!-- Globe vertical meridian -->
  <ellipse cx="256" cy="256" rx="74" ry="192" fill="none" stroke="#e8c84a" stroke-width="3.5" opacity="0.25"/>
  
  <!-- Horizontal equator -->
  <line x1="64" y1="256" x2="448" y2="256" stroke="#e8c84a" stroke-width="3.5" opacity="0.25"/>
  
  <!-- Vertical prime meridian -->
  <line x1="256" y1="64" x2="256" y2="448" stroke="#e8c84a" stroke-width="3.5" opacity="0.25"/>

  <!-- AP text -->
  <text x="256" y="296" 
        font-family="Georgia, serif" 
        font-size="120" 
        font-weight="bold"
        fill="#e8c84a" 
        text-anchor="middle"
        letter-spacing="6">AP</text>
</svg>