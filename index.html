<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AP World History">
<meta name="theme-color" content="#1a1f2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>AP World History Review</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>

  /* ═══════════════════════════════════════════
     SECTION 1: APP SHELL
  ═══════════════════════════════════════════ */

  :root {
    --bg-dark:      #1a1f2e;
    --bg-mid:       #252b3b;
    --bg-card:      #ffffff;
    --accent:       #e8c84a;
    --accent-dim:   rgba(232,200,74,0.15);
    --text-light:   #f0ede6;
    --text-dim:     rgba(240,237,230,0.55);
    --text-dark:    #1a1f2e;
    --text-mid:     #4a5068;
    --border:       rgba(255,255,255,0.08);

    --geo-asia:        #3b7fd4;
    --geo-mideast:     #c94040;
    --geo-africa:      #9b59b6;
    --geo-europe:      #27ae60;
    --geo-americas:    #e67e22;

    --geo-asia-bg:     rgba(59,127,212,0.12);
    --geo-mideast-bg:  rgba(201,64,64,0.12);
    --geo-africa-bg:   rgba(155,89,182,0.12);
    --geo-europe-bg:   rgba(39,174,96,0.12);
    --geo-americas-bg: rgba(230,126,34,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    height: 100vh;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--bg-dark);
  }

  .app-header {
    background: var(--bg-dark);
    padding: 0.7rem 1rem 0.5rem;
    text-align: center;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .app-header h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: clamp(1rem, 4vw, 1.25rem);
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .app-header .subtitle {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .tab-bar {
    display: flex;
    background: var(--bg-mid);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    border-bottom: 2px solid var(--accent);
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 1 1 0;
    padding: 0.65rem 0.75rem;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
  }

  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    background: #f4f2ee;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .content-tab { padding: 0.8rem; }

  .split-asia-europe     { background: linear-gradient(135deg, var(--geo-asia) 50%, var(--geo-europe) 50%); }
  .split-europe-asia     { background: linear-gradient(135deg, var(--geo-europe) 50%, var(--geo-asia) 50%); }
  .split-europe-americas { background: linear-gradient(135deg, var(--geo-europe) 50%, var(--geo-americas) 50%); }
  .split-europe-africa   { background: linear-gradient(135deg, var(--geo-europe) 50%, var(--geo-africa) 50%); }
  .split-asia-americas   { background: linear-gradient(135deg, var(--geo-asia) 50%, var(--geo-americas) 50%); }


  /* ═══════════════════════════════════════════
     TAB 1: TIMELINE & FLASHCARDS
  ═══════════════════════════════════════════ */

  .era-header {
    padding: 1rem 0.8rem 0.4rem;
    position: sticky;
    top: 0;
    z-index: 10;
    background: #f4f2ee;
  }
  .era-label {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg-dark);
    opacity: 0.45;
    margin-bottom: 0.25rem;
  }
  .era-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--bg-dark);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .era-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--bg-dark);
    opacity: 0.15;
  }

  .timeline-section {
    padding: 0 0.8rem 0.5rem;
    position: relative;
  }
  .timeline-section::before {
    content: '';
    position: absolute;
    left: 1.55rem;
    top: 0;
    bottom: 0;
    width: 2px;
    background: rgba(26,31,46,0.12);
  }

  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
    position: relative;
  }

  .event-dot {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    margin-top: 0.85rem;
    border: 2px solid white;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
    position: relative;
    z-index: 1;
  }

  .dot-asia     { background: var(--geo-asia); }
  .dot-mideast  { background: var(--geo-mideast); }
  .dot-africa   { background: var(--geo-africa); }
  .dot-europe   { background: var(--geo-europe); }
  .dot-americas { background: var(--geo-americas); }

  /* Dual-color dots — class names match sorted geo array output from geoClass() */
  .dot-asia-europe     { background: linear-gradient(135deg, var(--geo-asia) 50%, var(--geo-europe) 50%); }
  .dot-americas-europe { background: linear-gradient(135deg, var(--geo-americas) 50%, var(--geo-europe) 50%); }
  .dot-africa-europe   { background: linear-gradient(135deg, var(--geo-africa) 50%, var(--geo-europe) 50%); }
  .dot-americas-asia   { background: linear-gradient(135deg, var(--geo-americas) 50%, var(--geo-asia) 50%); }

  .event-card {
    flex: 1;
    background: white;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.09);
    cursor: pointer;
    overflow: hidden;
    transition: box-shadow 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .event-card:active {
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .event-card-bar { height: 4px; width: 100%; }
  .bar-asia     { background: var(--geo-asia); }
  .bar-mideast  { background: var(--geo-mideast); }
  .bar-africa   { background: var(--geo-africa); }
  .bar-europe   { background: var(--geo-europe); }
  .bar-americas { background: var(--geo-americas); }
  /* Dual-color bars — class names match sorted geo array output from geoClass() */
  .bar-asia-europe     { background: linear-gradient(to right, var(--geo-asia) 50%, var(--geo-europe) 50%); }
  .bar-americas-europe { background: linear-gradient(to right, var(--geo-americas) 50%, var(--geo-europe) 50%); }
  .bar-africa-europe   { background: linear-gradient(to right, var(--geo-africa) 50%, var(--geo-europe) 50%); }
  .bar-americas-asia   { background: linear-gradient(to right, var(--geo-americas) 50%, var(--geo-asia) 50%); }

  .event-card-front {
    padding: 0.55rem 0.75rem 0.3rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .event-card-label {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.35;
    flex: 1;
  }
  .event-card-year {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-mid);
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .event-card-tap-hint {
    font-size: 0.65rem;
    color: var(--text-mid);
    opacity: 0.5;
    padding: 0 0.75rem 0.45rem;
  }

  .event-card-back {
    display: none;
    padding: 0.6rem 0.75rem 0.75rem;
    border-top: 1px solid rgba(0,0,0,0.07);
    background: #fafaf8;
  }
  .event-card-back.open { display: block; }

  .event-card-back ol {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: fact-counter;
  }
  .event-card-back ol li {
    counter-increment: fact-counter;
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
    font-size: 0.84rem;
    color: var(--text-dark);
    line-height: 1.6;
  }
  .event-card-back ol li:last-child { margin-bottom: 0; }
  .event-card-back ol li::before {
    content: counter(fact-counter);
    flex-shrink: 0;
    width: 1.3rem;
    height: 1.3rem;
    border-radius: 50%;
    background: var(--bg-dark);
    color: var(--accent);
    font-size: 0.65rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0.18rem;
  }

  .event-card-chevron {
    display: inline-block;
    font-size: 0.6rem;
    color: var(--text-mid);
    opacity: 0.45;
    margin-left: 0.3rem;
    transition: transform 0.2s;
    vertical-align: middle;
  }
  .event-card.expanded .event-card-chevron {
    transform: rotate(180deg);
  }

  .geo-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 0.75rem;
    padding: 0.6rem 0.8rem 0.3rem;
  }
  .geo-legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.68rem;
    color: var(--text-mid);
    letter-spacing: 0.04em;
  }
  .geo-legend-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }


  /* ═══════════════════════════════════════════
     TAB 2: GAMES
  ═══════════════════════════════════════════ */

  /* ── Game selector ── */
  .game-selector {
    display: flex;
    gap: 0;
    background: var(--bg-dark);
    padding: 0.6rem 0.8rem;
    gap: 0.5rem;
  }
  .game-select-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    padding: 0.5rem 0.25rem;
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .game-select-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .game-select-icon { font-size: 1.1rem; line-height: 1; }
  .game-select-label {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.2;
  }

  /* ── Score bar ── */
  .game-score-bar {
    display: flex;
    background: var(--bg-mid);
    padding: 0.5rem 0.8rem;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .game-score-item {
    flex: 1;
    text-align: center;
  }
  .game-score-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.1rem;
  }
  .game-score-value {
    font-family: 'Lora', Georgia, serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }

  /* ── Game panels ── */
  .game-panel { display: none; }
  .game-panel.active { display: block; }

  .game-content {
    padding: 0.8rem;
    min-height: 200px;
  }

  /* ── Shared question card ── */
  .game-question-card {
    background: white;
    border-radius: 10px;
    padding: 1rem 1rem 0.75rem;
    margin-bottom: 0.8rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.09);
  }
  .game-question-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 0.5rem;
  }
  .game-event-name {
    font-family: 'Lora', Georgia, serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.35;
  }
  .game-event-year-hint {
    font-size: 0.75rem;
    color: var(--text-mid);
    margin-top: 0.25rem;
  }

  /* ── Feedback banner ── */
  .game-feedback {
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    margin-bottom: 0.8rem;
    font-size: 0.85rem;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 0.5rem;
  }
  .game-feedback.show { display: flex; }
  .game-feedback.correct {
    background: rgba(39,174,96,0.12);
    color: #1a6b3a;
    border: 1px solid rgba(39,174,96,0.3);
  }
  .game-feedback.wrong {
    background: rgba(201,64,64,0.1);
    color: #8b1a1a;
    border: 1px solid rgba(201,64,64,0.25);
  }
  .game-feedback-icon { font-size: 1.1rem; flex-shrink: 0; }

  /* ── Next button ── */
  .game-next-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg-dark);
    color: var(--accent);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: none;
    margin-top: 0.4rem;
    -webkit-tap-highlight-color: transparent;
  }
  .game-next-btn.show { display: block; }

  /* ── PLACE IT specific ── */
  .place-it-instruction {
    font-size: 0.8rem;
    color: var(--text-mid);
    margin-bottom: 0.7rem;
    line-height: 1.45;
  }
  .era-choices {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 0.6rem;
  }
  .era-choice-btn {
    width: 100%;
    padding: 0.75rem 1rem;
    background: white;
    border: 2px solid rgba(26,31,46,0.12);
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .era-choice-btn:active { background: #f0f0f0; }
  .era-choice-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dark);
  }
  .era-choice-range {
    font-size: 0.72rem;
    color: var(--text-mid);
    margin-top: 0.1rem;
  }
  .era-choice-btn.correct-pick {
    border-color: #27ae60;
    background: rgba(39,174,96,0.08);
  }
  .era-choice-btn.wrong-pick {
    border-color: #c94040;
    background: rgba(201,64,64,0.06);
  }
  .era-choice-btn:disabled { cursor: default; }

  /* Position markers — shown after correct era tap */
  .position-stage {
    display: none;
    margin-top: 0.6rem;
  }
  .position-stage.show { display: block; }
  .position-instruction {
    font-size: 0.8rem;
    color: var(--text-mid);
    margin-bottom: 0.6rem;
    line-height: 1.45;
  }
  .position-choices {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .position-btn {
    width: 100%;
    padding: 0.6rem 0.9rem;
    background: white;
    border: 2px solid rgba(26,31,46,0.12);
    border-radius: 7px;
    text-align: left;
    cursor: pointer;
    font-size: 0.84rem;
    color: var(--text-dark);
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .position-btn .pos-label { font-family: 'Lora', Georgia, serif; font-weight: 600; }
  .position-btn .pos-year  { font-size: 0.72rem; color: var(--text-mid); }
  .position-btn.correct-pick {
    border-color: #27ae60;
    background: rgba(39,174,96,0.08);
  }
  .position-btn.wrong-pick {
    border-color: #c94040;
    background: rgba(201,64,64,0.06);
  }
  .position-btn:disabled { cursor: default; }

  /* ── WHICH CAME FIRST specific ── */
  .which-first-choices {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }
  .which-first-btn {
    width: 100%;
    padding: 0.85rem 1rem;
    background: white;
    border: 2px solid rgba(26,31,46,0.12);
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .which-first-btn:active { background: #f0f0f0; }
  .which-first-btn .wf-label {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.3;
  }
  .which-first-btn .wf-year {
    font-size: 0.72rem;
    color: var(--text-mid);
    margin-top: 0.2rem;
    display: none; /* revealed after answer */
  }
  .which-first-btn.correct-pick {
    border-color: #27ae60;
    background: rgba(39,174,96,0.08);
  }
  .which-first-btn.wrong-pick {
    border-color: #c94040;
    background: rgba(201,64,64,0.06);
  }
  .which-first-btn.reveal-year .wf-year { display: block; }
  .which-first-btn:disabled { cursor: default; }

  /* ── SORT IT specific ── */
  .sort-it-instruction {
    font-size: 0.8rem;
    color: var(--text-mid);
    margin-bottom: 0.7rem;
    line-height: 1.45;
  }
  .sort-choices {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    margin-bottom: 0.6rem;
  }
  .sort-btn {
    width: 100%;
    padding: 0.7rem 1rem;
    background: white;
    border: 2px solid rgba(26,31,46,0.12);
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-btn:active { background: #f0f0f0; }
  .sort-btn-rank {
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    background: var(--bg-dark);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0.25;
    transition: opacity 0.15s;
  }
  .sort-btn.selected .sort-btn-rank { opacity: 1; }
  .sort-btn-label {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.3;
    flex: 1;
  }
  .sort-btn-year {
    font-size: 0.7rem;
    color: var(--text-mid);
    display: none;
  }
  .sort-btn.correct-pick {
    border-color: #27ae60;
    background: rgba(39,174,96,0.08);
  }
  .sort-btn.wrong-pick {
    border-color: #c94040;
    background: rgba(201,64,64,0.06);
  }
  .sort-btn.reveal-year .sort-btn-year { display: block; }
  .sort-btn:disabled { cursor: default; }
  .sort-submit-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--bg-dark);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.15s;
    margin-bottom: 0.5rem;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-submit-btn.ready {
    opacity: 1;
    background: var(--bg-dark);
    color: var(--accent);
  }


  /* ═══════════════════════════════════════════
     TAB 3: ART & PRIMARY SOURCES
  ═══════════════════════════════════════════ */

  .art-tab-content {
    padding: 0.8rem;
  }

  /* ── Art card ── */
  .art-card {
    background: white;
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
  }

  /* Image area */
  .art-card-img-wrap {

<script>

  // ── Tab switching ────────────────────────
  function showTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    document.querySelector('.content').scrollTop = 0;
  }

  // ── Timeline helpers ─────────────────────
  function geoClass(geo) {
    if (geo.length === 1) return geo[0];
    return [...geo].sort().join('-');
  }

  function yearDisplay(event) {
    return event.yearEnd ? `${event.year}–${event.yearEnd}` : `${event.year}`;
  }

  // ── Build timeline ───────────────────────
  function buildTimeline() {
    const container = document.getElementById('tab-timeline');
    container.innerHTML = '';

    // Legend
    const legend = document.createElement('div');
    legend.className = 'geo-legend';
    legend.innerHTML = `
      <div class="geo-legend-item"><div class="geo-legend-dot" style="background:var(--geo-asia)"></div>Asia</div>
      <div class="geo-legend-item"><div class="geo-legend-dot" style="background:var(--geo-mideast)"></div>Middle East</div>
      <div class="geo-legend-item"><div class="geo-legend-dot" style="background:var(--geo-africa)"></div>Africa</div>
      <div class="geo-legend-item"><div class="geo-legend-dot" style="background:var(--geo-europe)"></div>Europe</div>
      <div class="geo-legend-item"><div class="geo-legend-dot" style="background:var(--geo-americas)"></div>Americas</div>
    `;
    container.appendChild(legend);

    const eras = [
      { num: 1, label: 'Era 1', title: '1200 – 1450' },
      { num: 2, label: 'Era 2', title: '1450 – 1750' },
      { num: 3, label: 'Era 3', title: '1750 – Present' },
    ];

    eras.forEach(era => {
      const events = EVENTS.filter(e => e.era === era.num);

      // Era header
      const header = document.createElement('div');
      header.className = 'era-header';
      header.innerHTML = `
        <div class="era-label">${era.label}</div>
        <div class="era-title">${era.title}</div>
      `;
      container.appendChild(header);

      // Timeline section
      const section = document.createElement('div');
      section.className = 'timeline-section';

      events.forEach(event => {
        const gc = geoClass(event.geo);

        const item = document.createElement('div');
        item.className = 'event-item';

        // Dot
        const dot = document.createElement('div');
        dot.className = `event-dot dot-${gc}`;
        item.appendChild(dot);

        // Card
        const card = document.createElement('div');
        card.className = 'event-card';
        card.setAttribute('data-id', event.id);

        // Color bar
        const bar = document.createElement('div');
        bar.className = `event-card-bar bar-${gc}`;
        card.appendChild(bar);

        // Front
        const front = document.createElement('div');
        front.className = 'event-card-front';
        front.innerHTML = `
          <div class="event-card-label">${event.label} <span class="event-card-chevron">▼</span></div>
          <div class="event-card-year">${yearDisplay(event)}</div>
        `;
        card.appendChild(front);

        // Tap hint
        const hint = document.createElement('div');
        hint.className = 'event-card-tap-hint';
        hint.textContent = 'Tap to see facts';
        card.appendChild(hint);

        // Facts
        const back = document.createElement('div');
        back.className = 'event-card-back';
        const ol = document.createElement('ol');
        event.facts.forEach(fact => {
          const li = document.createElement('li');
          li.textContent = fact;
          ol.appendChild(li);
        });
        back.appendChild(ol);
        card.appendChild(back);

        // Toggle
        card.addEventListener('click', () => {
          const isOpen = card.classList.contains('expanded');
          card.classList.toggle('expanded', !isOpen);
          back.classList.toggle('open', !isOpen);
          hint.textContent = isOpen ? 'Tap to see facts' : 'Tap to hide facts';
        });

        item.appendChild(card);
        section.appendChild(item);
      });

      container.appendChild(section);
    });
  }

  // ── Init ─────────────────────────────────
  document.addEventListener('DOMContentLoaded', buildTimeline);

</script>

<script>

  // ── Game state ───────────────────────────
  const gameState = {
    'place-it':    { streak: 0, best: 0, correct: 0, total: 0 },
    'which-first': { streak: 0, best: 0, correct: 0, total: 0 },
    'sort-it':     { streak: 0, best: 0, correct: 0, total: 0 }
  };

  // ── Game selector ────────────────────────
  function selectGame(name, btn) {
    document.querySelectorAll('.game-select-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('game-' + name).classList.add('active');
  }

  // ── Score helpers ────────────────────────
  function updateScore(game, correct) {
    const s = gameState[game];
    s.total++;
    if (correct) {
      s.correct++;
      s.streak++;
      if (s.streak > s.best) s.best = s.streak;
    } else {
      s.streak = 0;
    }
    const prefix = game;
    document.getElementById(prefix + '-streak').textContent  = s.streak;
    document.getElementById(prefix + '-best').textContent    = s.best;
    document.getElementById(prefix + '-correct').textContent = s.correct;
    document.getElementById(prefix + '-total').textContent   = s.total;

    // Flash streak on correct
    if (correct) {
      const el = document.getElementById(prefix + '-streak');
      el.style.transform = 'scale(1.4)';
      el.style.transition = 'transform 0.15s';
      setTimeout(() => { el.style.transform = 'scale(1)'; }, 200);
    }
  }

  function showFeedback(game, correct, msg) {
    const panel = document.getElementById('game-' + game);
    let fb = panel.querySelector('.game-feedback');
    if (!fb) return;
    fb.className = 'game-feedback show ' + (correct ? 'correct' : 'wrong');
    fb.innerHTML = `<span class="game-feedback-icon">${correct ? '✓' : '✗'}</span> ${msg}`;
  }

  function showNext(game) {
    const panel = document.getElementById('game-' + game);
    const btn = panel.querySelector('.game-next-btn');
    if (btn) btn.classList.add('show');
  }

  // ── Shuffle helper ───────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function pickRandom(arr, n) {
    return shuffle(arr).slice(0, n);
  }

  // ══════════════════════════════════════════
  // PLACE IT
  // ══════════════════════════════════════════

  // Era definitions with position buckets
  const ERA_DEFS = [
    { num: 1, label: 'Era 1', range: '1200 – 1450',
      buckets: [
        { label: 'Early Era 1',  start: 1200, end: 1299 },
        { label: 'Mid Era 1',    start: 1300, end: 1374 },
        { label: 'Late Era 1',   start: 1375, end: 1450 },
      ]
    },
    { num: 2, label: 'Era 2', range: '1450 – 1750',
      buckets: [
        { label: 'Early Era 2',  start: 1450, end: 1549 },
        { label: 'Mid Era 2',    start: 1550, end: 1649 },
        { label: 'Late Era 2',   start: 1650, end: 1750 },
      ]
    },
    { num: 3, label: 'Era 3', range: '1750 – Present',
      buckets: [
        { label: 'Early Era 3',  start: 1750, end: 1849 },
        { label: 'Mid Era 3',    start: 1850, end: 1919 },
        { label: 'Late Era 3',   start: 1920, end: 1950 },
      ]
    },
  ];

  function getEraForEvent(event) {
    return ERA_DEFS.find(e => e.num === event.era);
  }

  function getBucketForEvent(event, era) {
    return era.buckets.find(b => event.year >= b.start && event.year <= b.end)
        || era.buckets[era.buckets.length - 1]; // fallback to last bucket
  }

  let placeItEvent = null;
  let placeItStage = 1; // 1 = era, 2 = position
  let placeItEraCorrect = false;

  function buildPlaceIt() {
    placeItEvent = pickRandom(EVENTS, 1)[0];
    placeItStage = 1;
    placeItEraCorrect = false;

    const content = document.getElementById('place-it-content');
    content.innerHTML = '';

    // Question card
    const qCard = document.createElement('div');
    qCard.className = 'game-question-card';
    qCard.innerHTML = `
      <div class="game-question-label">Place this event on the timeline</div>
      <div class="game-event-name">${placeItEvent.label}</div>
    `;
    content.appendChild(qCard);

    // Instruction
    const instr = document.createElement('div');
    instr.className = 'place-it-instruction';
    instr.textContent = 'Step 1 of 2 — Which era does this event belong to?';
    content.appendChild(instr);

    // Era choices
    const eraChoices = document.createElement('div');
    eraChoices.className = 'era-choices';
    ERA_DEFS.forEach(era => {
      const btn = document.createElement('button');
      btn.className = 'era-choice-btn';
      btn.innerHTML = `
        <div class="era-choice-title">${era.label}</div>
        <div class="era-choice-range">${era.range}</div>
      `;
      btn.addEventListener('click', () => handleEraChoice(era, btn, eraChoices, posStage, instr));
      eraChoices.appendChild(btn);
    });
    content.appendChild(eraChoices);

    // Position stage (hidden until era correct)
    const posStage = document.createElement('div');
    posStage.className = 'position-stage';
    content.appendChild(posStage);

    // Feedback
    const fb = document.createElement('div');
    fb.className = 'game-feedback';
    content.appendChild(fb);

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.className = 'game-next-btn';
    nextBtn.textContent = 'Next Event →';
    nextBtn.addEventListener('click', buildPlaceIt);
    content.appendChild(nextBtn);
  }

  function handleEraChoice(era, btn, eraChoices, posStage, instr) {
    const correctEra = getEraForEvent(placeItEvent);
    const isCorrect = era.num === correctEra.num;

    // Disable all era buttons
    eraChoices.querySelectorAll('.era-choice-btn').forEach(b => {
      b.disabled = true;
      if (b === btn) b.classList.add(isCorrect ? 'correct-pick' : 'wrong-pick');
      if (!isCorrect && ERA_DEFS[b.dataset ? parseInt(b.dataset.era) - 1 : 0]) {
        // highlight correct era
      }
    });

    // Highlight correct era button regardless
    Array.from(eraChoices.querySelectorAll('.era-choice-btn')).forEach((b, i) => {
      if (ERA_DEFS[i].num === correctEra.num && !isCorrect) {
        b.classList.add('correct-pick');
      }
    });

    if (isCorrect) {
      instr.textContent = 'Correct era! Step 2 of 2 — Where in Era ' + correctEra.num + ' does it fall?';
      buildPositionStage(correctEra, posStage);
      posStage.classList.add('show');
    } else {
      // Wrong era — streak resets, show answer, offer next
      updateScore('place-it', false);
      const fb = document.querySelector('#game-place-it .game-feedback');
      fb.className = 'game-feedback show wrong';
      fb.innerHTML = `<span class="game-feedback-icon">✗</span> Not quite — ${placeItEvent.label} (${placeItEvent.year}) belongs to ${correctEra.label} (${correctEra.range}).`;
      showNext('place-it');
    }
  }

  function buildPositionStage(era, posStage) {
    const correctBucket = getBucketForEvent(placeItEvent, era);

    const instr2 = document.createElement('div');
    instr2.className = 'position-instruction';
    instr2.textContent = 'Where in ' + era.label + ' does it fall?';
    posStage.appendChild(instr2);

    const choices = document.createElement('div');
    choices.className = 'position-choices';

    era.buckets.forEach(bucket => {
      const btn = document.createElement('button');
      btn.className = 'position-btn';
      btn.innerHTML = `
        <span class="pos-label">${bucket.label}</span>
        <span class="pos-year">${bucket.start}–${bucket.end}</span>
      `;
      btn.addEventListener('click', () => handlePositionChoice(bucket, correctBucket, btn, choices));
      choices.appendChild(btn);
    });

    posStage.appendChild(choices);
  }

  function handlePositionChoice(bucket, correctBucket, btn, choices) {
    const isCorrect = bucket.start === correctBucket.start;

    // Disable all position buttons
    choices.querySelectorAll('.position-btn').forEach(b => {
      b.disabled = true;
      // Highlight correct bucket
      if (b.querySelector('.pos-label').textContent === correctBucket.label) {
        b.classList.add('correct-pick');
      }
    });

    // Mark chosen button if wrong
    if (!isCorrect) {
      btn.classList.add('wrong-pick');
    }

    updateScore('place-it', isCorrect);

    const fb = document.querySelector('#game-place-it .game-feedback');
    if (isCorrect) {
      fb.className = 'game-feedback show correct';
      fb.innerHTML = `<span class="game-feedback-icon">✓</span> Correct! ${placeItEvent.label} — ${placeItEvent.year}.`;
    } else {
      fb.className = 'game-feedback show wrong';
      fb.innerHTML = `<span class="game-feedback-icon">✗</span> Not quite — ${placeItEvent.label} falls in ${correctBucket.label} (${correctBucket.start}–${correctBucket.end}).`;
    }
    showNext('place-it');
  }


  // ══════════════════════════════════════════
  // WHICH CAME FIRST
  // ══════════════════════════════════════════

  function buildWhichFirst() {
    const [eventA, eventB] = pickRandom(EVENTS, 2);
    // Ensure they're different years (re-pick if same)
    if (eventA.year === eventB.year) { buildWhichFirst(); return; }

    const earlier = eventA.year < eventB.year ? eventA : eventB;
    const events = shuffle([eventA, eventB]);

    const content = document.getElementById('which-first-content');
    content.innerHTML = '';

    // Question card
    const qCard = document.createElement('div');
    qCard.className = 'game-question-card';
    qCard.innerHTML = `
      <div class="game-question-label">Which came first?</div>
      <div class="game-event-name" style="font-size:0.85rem;color:var(--text-mid);font-family:'Inter',sans-serif;font-weight:400;">Tap the earlier event</div>
    `;
    content.appendChild(qCard);

    // Choices
    const choices = document.createElement('div');
    choices.className = 'which-first-choices';

    events.forEach(event => {
      const btn = document.createElement('button');
      btn.className = 'which-first-btn';
      btn.innerHTML = `
        <div class="wf-label">${event.label}</div>
        <div class="wf-year">${yearDisplay(event)}</div>
      `;
      btn.addEventListener('click', () => {
        const isCorrect = event.id === earlier.id;

        // Disable + reveal years
        choices.querySelectorAll('.which-first-btn').forEach(b => {
          b.disabled = true;
          b.classList.add('reveal-year');
        });
        btn.classList.add(isCorrect ? 'correct-pick' : 'wrong-pick');
        // Always highlight the correct (earlier) button
        choices.querySelectorAll('.which-first-btn').forEach(b => {
          const lbl = b.querySelector('.wf-label').textContent;
          const isEarlier = events.some(e => e.label === lbl && e.id === earlier.id);
          if (isEarlier && !isCorrect) b.classList.add('correct-pick');
        });

        updateScore('which-first', isCorrect);

        const fb = document.querySelector('#game-which-first .game-feedback');
        if (isCorrect) {
          fb.className = 'game-feedback show correct';
          fb.innerHTML = `<span class="game-feedback-icon">✓</span> Correct! ${earlier.label} (${earlier.year}) came first.`;
        } else {
          fb.className = 'game-feedback show wrong';
          fb.innerHTML = `<span class="game-feedback-icon">✗</span> ${earlier.label} (${earlier.year}) came first.`;
        }
        showNext('which-first');
      });
      choices.appendChild(btn);
    });

    content.appendChild(choices);

    // Feedback
    const fb = document.createElement('div');
    fb.className = 'game-feedback';
    content.appendChild(fb);

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.className = 'game-next-btn';
    nextBtn.textContent = 'Next Pair →';
    nextBtn.addEventListener('click', buildWhichFirst);
    content.appendChild(nextBtn);
  }


  // ══════════════════════════════════════════
  // SORT IT
  // ══════════════════════════════════════════

  let sortItOrder = [];    // student's chosen order (array of event objects)
  let sortItEvents = [];   // the shuffled events for this round
  let sortItSubmitted = false;

  function buildSortIt() {
    const count = Math.random() < 0.5 ? 4 : 5; // 4 or 5 events
    sortItEvents = pickRandom(EVENTS, count);
    sortItOrder = [];
    sortItSubmitted = false;

    const content = document.getElementById('sort-it-content');
    content.innerHTML = '';

    // Question card
    const qCard = document.createElement('div');
    qCard.className = 'game-question-card';
    qCard.innerHTML = `
      <div class="game-question-label">Sort It — Chronological Order</div>
      <div class="game-event-name" style="font-size:0.85rem;color:var(--text-mid);font-family:'Inter',sans-serif;font-weight:400;">Tap events in order from earliest to latest</div>
    `;
    content.appendChild(qCard);

    // Instruction
    const instr = document.createElement('div');
    instr.className = 'sort-it-instruction';
    instr.textContent = `Tap all ${count} events in chronological order (earliest first), then tap Check Order.`;
    content.appendChild(instr);

    // Sort buttons
    const choices = document.createElement('div');
    choices.className = 'sort-choices';
    choices.id = 'sort-choices';

    sortItEvents.forEach((event, i) => {
      const btn = document.createElement('button');
      btn.className = 'sort-btn';
      btn.dataset.id = event.id;
      btn.innerHTML = `
        <div class="sort-btn-rank">—</div>
        <div class="sort-btn-label">${event.label}</div>
        <div class="sort-btn-year">${yearDisplay(event)}</div>
      `;
      btn.addEventListener('click', () => handleSortTap(event, btn, submitBtn));
      choices.appendChild(btn);
    });

    content.appendChild(choices);

    // Submit button
    const submitBtn = document.createElement('button');
    submitBtn.className = 'sort-submit-btn';
    submitBtn.textContent = 'Check Order';
    submitBtn.disabled = true;
    submitBtn.addEventListener('click', () => checkSortOrder(submitBtn));
    content.appendChild(submitBtn);

    // Feedback
    const fb = document.createElement('div');
    fb.className = 'game-feedback';
    content.appendChild(fb);

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.className = 'game-next-btn';
    nextBtn.textContent = 'Next Round →';
    nextBtn.addEventListener('click', buildSortIt);
    content.appendChild(nextBtn);
  }

  function handleSortTap(event, btn, submitBtn) {
    if (sortItSubmitted) return;

    // If already selected, deselect and remove from order
    if (btn.classList.contains('selected')) {
      sortItOrder = sortItOrder.filter(e => e.id !== event.id);
      btn.classList.remove('selected');
      btn.querySelector('.sort-btn-rank').textContent = '—';
      // Re-number remaining
      renumberSortOrder();
    } else {
      // Add to order
      sortItOrder.push(event);
      btn.classList.add('selected');
      btn.querySelector('.sort-btn-rank').textContent = sortItOrder.length;
    }

    // Enable submit when all events placed
    if (sortItOrder.length === sortItEvents.length) {
      submitBtn.disabled = false;
      submitBtn.classList.add('ready');
    } else {
      submitBtn.disabled = true;
      submitBtn.classList.remove('ready');
    }
  }

  function renumberSortOrder() {
    const choices = document.getElementById('sort-choices');
    sortItOrder.forEach((event, i) => {
      const btn = choices.querySelector(`[data-id="${event.id}"]`);
      if (btn) btn.querySelector('.sort-btn-rank').textContent = i + 1;
    });
    // Clear unselected
    choices.querySelectorAll('.sort-btn:not(.selected) .sort-btn-rank').forEach(el => {
      el.textContent = '—';
    });
  }

  function checkSortOrder(submitBtn) {
    sortItSubmitted = true;
    submitBtn.disabled = true;
    submitBtn.classList.remove('ready');

    // Rebuild student order from displayed rank numbers (source of truth)
    const choices = document.getElementById('sort-choices');
    const studentOrderByRank = [];
    choices.querySelectorAll('.sort-btn.selected').forEach(btn => {
      const rank = parseInt(btn.querySelector('.sort-btn-rank').textContent) - 1;
      studentOrderByRank[rank] = sortItEvents.find(e => e.id === btn.dataset.id);
    });

    // Correct order = sorted by year ascending
    const correctOrder = [...sortItEvents].sort((a, b) => a.year - b.year);
    const isCorrect = studentOrderByRank.every((e, i) => e && e.id === correctOrder[i].id);

    // Reveal years and mark correct/wrong
    choices.querySelectorAll('.sort-btn').forEach(btn => {
      btn.disabled = true;
      btn.classList.add('reveal-year');
      const eventId = btn.dataset.id;
      const studentPos = studentOrderByRank.findIndex(e => e && e.id === eventId);
      const correctPos = correctOrder.findIndex(e => e.id === eventId);
      if (studentPos === correctPos) {
        btn.classList.add('correct-pick');
      } else {
        btn.classList.add('wrong-pick');
      }
      // Show correct position number
      btn.querySelector('.sort-btn-rank').textContent = correctPos + 1;
    });

    updateScore('sort-it', isCorrect);

    const fb = document.querySelector('#game-sort-it .game-feedback');
    if (isCorrect) {
      fb.className = 'game-feedback show correct';
      fb.innerHTML = `<span class="game-feedback-icon">✓</span> Perfect order!`;
    } else {
      const correctLabels = correctOrder.map((e, i) => `${i+1}. ${e.label} (${e.year})`).join(' → ');
      fb.className = 'game-feedback show wrong';
      fb.innerHTML = `<span class="game-feedback-icon">✗</span> Not quite. Correct order: ${correctLabels}`;
    }
    showNext('sort-it');
  }


  // ── Init games on DOMContentLoaded ───────
  document.addEventListener('DOMContentLoaded', () => {
    buildPlaceIt();
    buildWhichFirst();
    buildSortIt();
  });

</script>


<!-- ═══════════════════════════════════════════
     TAB 3: ART & PRIMARY SOURCES LOGIC
═══════════════════════════════════════════ -->
<script>

  function buildArtTab() {
    const container = document.getElementById('art-tab-content');
    container.innerHTML = '';

    ART.forEach(art => {
      const card = document.createElement('div');
      card.className = 'art-card';

      // ── Image or scroll link ──
      if (art.columbiaUrl) {
        // Qingming Scroll — link to Columbia interactive
        const link = document.createElement('a');
        link.className = 'art-scroll-link';
        link.href = art.columbiaUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.innerHTML = `
          <div class="art-scroll-link-icon">🖼️</div>
          <div class="art-scroll-link-text">
            <div class="art-scroll-link-title">View Interactive Scroll</div>
            <div class="art-scroll-link-sub">Columbia University — Along the River During the Qingming Festival</div>
          </div>
          <div class="art-scroll-link-arrow">→</div>
        `;
        card.appendChild(link);
      } else {
        // Standard image
        const imgWrap = document.createElement('div');
        imgWrap.className = 'art-card-img-wrap';
        const img = document.createElement('img');
        img.className = 'art-card-img';
        img.src = art.filename;
        img.alt = art.title;
        img.loading = 'lazy';
        // On error, show placeholder
        img.onerror = function() {
          imgWrap.innerHTML = `
            <div class="art-card-img-placeholder">
              <span>🎨</span>
              <p>${art.filename}</p>
            </div>
          `;
        };
        imgWrap.appendChild(img);
        card.appendChild(imgWrap);
      }

      // ── Header ──
      const header = document.createElement('div');
      header.className = 'art-card-header';
      header.innerHTML = `
        <div class="art-card-title">${art.title}</div>
        <div class="art-card-meta">${art.artist} · ${art.date}</div>
      `;
      card.appendChild(header);

      // ── Body ──
      const body = document.createElement('div');
      body.className = 'art-card-body';

      // Context points
      const ul = document.createElement('ul');
      ul.className = 'art-context-list';
      art.context.forEach(point => {
        const li = document.createElement('li');
        li.innerHTML = `<div class="art-context-bullet"></div><div>${point}</div>`;
        ul.appendChild(li);
      });
      body.appendChild(ul);

      // Look for prompt
      const lookFor = document.createElement('div');
      lookFor.className = 'art-look-for';
      lookFor.innerHTML = `
        <div class="art-look-for-label">What to look for</div>
        <div class="art-look-for-text">${art.lookFor}</div>
      `;
      body.appendChild(lookFor);

      // Connected events
      if (art.connectedEvents && art.connectedEvents.length > 0) {
        const connLabel = document.createElement('div');
        connLabel.className = 'art-connected-label';
        connLabel.textContent = 'Connected Events';
        body.appendChild(connLabel);

        const chips = document.createElement('div');
        chips.className = 'art-connected-chips';
        art.connectedEvents.forEach(eventId => {
          const event = EVENTS.find(e => e.id === eventId);
          if (!event) return;
          const chip = document.createElement('div');
          chip.className = 'art-connected-chip';
          chip.innerHTML = `${event.label}<span class="chip-year">${yearDisplay(event)}</span>`;
          chips.appendChild(chip);
        });
        body.appendChild(chips);
      }

      card.appendChild(body);
      container.appendChild(card);
    });
  }

  document.addEventListener('DOMContentLoaded', buildArtTab);

</script>
